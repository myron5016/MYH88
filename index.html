<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>梦想金库</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero">
    <div class="avatar">❤</div>
    <div>
      <h1>梦想金库</h1>
      <p>爸爸妈妈为你种下的未来</p>
    </div>
    <button id="refreshBtn" class="primary">刷新价格</button>
  </header>

  <main class="wrap">
    <section class="cards">
      <div class="card"><span>梦想基金</span><strong id="totalValue">--</strong></div>
      <div class="card"><span>总盈亏</span><strong id="totalPnl">--</strong></div>
      <div class="card"><span>收益率</span><strong id="totalReturn">--</strong></div>
      <div class="card"><span>价格状态</span><strong id="statusText">准备刷新</strong></div>
    </section>

    <section class="panel">
      <div class="panel-title">
        <h2>持仓</h2>
        <small id="lastUpdated">尚未更新</small>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>代码</th><th>名称</th><th>数量</th><th>成本价</th><th>最新价</th>
              <th>市值USD</th><th>总成本USD</th><th>盈亏USD</th><th>收益率</th><th>板块</th>
            </tr>
          </thead>
          <tbody id="portfolioBody"></tbody>
        </table>
      </div>
    </section>

    <section id="adminPanel" class="panel admin hidden">
      <div class="panel-title">
        <h2>持仓编辑区</h2>
        <small>仅管理员模式显示：网址后加 ?admin=1</small>
      </div>
      <p>V7默认取消自动循环刷新，只在打开网站时自动刷新一次；之后需要点“刷新价格”。</p>
      <p>数据在 <code>script.js</code> 顶部的 <code>portfolio</code> 数组里维护。</p>
    </section>
  </main>

  <footer>♥ 送给最爱的宝贝</footer>
  <script src="script.js"></script>
</body>
</html>
